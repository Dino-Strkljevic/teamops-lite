server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/teamops}
    username: ${DB_USERNAME:teamops}
    password: ${DB_PASSWORD:teamops}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minio}
  secret-key: ${MINIO_SECRET_KEY:minio123}
  bucket: ${MINIO_BUCKET:teamops-uploads}
  presigned-url-expiry-minutes: ${MINIO_PRESIGNED_EXPIRY_MINUTES:60}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-secure-256-bit-secret-value-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
