version: "3.9"

services:
  db:
    image: postgres:16
    container_name: teamops-db
    restart: always
    environment:
      POSTGRES_DB: teamops
      POSTGRES_USER: teamops
      POSTGRES_PASSWORD: teamops
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: teamops-minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minio minio123;
      mc mb -p local/teamops-uploads;
      mc anonymous set download local/teamops-uploads;
      exit 0;
      "

volumes:
  db_data:
  minio_data: